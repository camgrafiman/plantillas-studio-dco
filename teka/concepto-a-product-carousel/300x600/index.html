<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Teka — 300×600 — Producto Dinámico</title>

    <script src="https://s0.2mdn.net/ads/studio/Enabler.js"></script>
    <script src="https://s0.2mdn.net/ads/studio/cached_libs/gsap_3.14.2_min.js"></script>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:ital,wght@0,300;0,400;0,600;0,700;0,800;0,900;1,300&display=swap" rel="stylesheet">

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body, html { width: 100%; height: 100%; overflow: hidden; background: #000; }

        #banner {
            position: relative;
            width: 300px;
            height: 600px;
            background: #000;
            overflow: hidden;
            visibility: hidden;
            user-select: none;
            font-family: 'Inter', Helvetica, Arial, sans-serif;
        }

        /* ═══════════════════════════════
           HEADER
        ═══════════════════════════════ */
        #header {
            position: absolute;
            top: 0; left: 0; right: 0; height: 56px;
            background: #000;
            display: flex; align-items: center; justify-content: center;
            z-index: 20;
        }

        /* Thin side rules flanking logo */
        #header::before,
        #header::after {
            content: '';
            position: absolute;
            top: 50%; height: 1px;
            width: 30px;
            background: rgba(255,255,255,0.18);
        }
        #header::before { left: 24px; }
        #header::after  { right: 24px; }

        #logo {
            font-size: 19px;
            font-weight: 900;
            color: #fff;
            letter-spacing: 0.28em;
            text-transform: uppercase;
        }

        #header-rule {
            position: absolute;
            top: 56px; left: 0; right: 0; height: 2px;
            background: #E30613;
            z-index: 20;
            transform-origin: left center;
        }

        /* Frame counter */
        #frame-counter {
            position: absolute;
            top: 20px; right: 14px;
            font-size: 8.5px; font-weight: 700;
            color: rgba(255,255,255,0.25);
            letter-spacing: 0.12em;
            z-index: 22;
        }

        /* ═══════════════════════════════
           FRAMES
        ═══════════════════════════════ */
        .frame {
            position: absolute;
            top: 58px; left: 0; right: 0;
            height: 542px;
            display: flex;
            flex-direction: column;
        }

        /* ── Photo area ── */
        .photo-wrap {
            width: 300px;
            height: 308px;
            flex-shrink: 0;
            overflow: hidden;
            position: relative;
        }

        .photo-wrap img {
            width: 100%; height: 100%;
            object-fit: cover;
            display: block;
            transform-origin: center center;
        }

        /* Gradient blending photo into black info block */
        .photo-wrap::after {
            content: '';
            position: absolute;
            bottom: 0; left: 0; right: 0; height: 100px;
            background: linear-gradient(to bottom,
                transparent 0%,
                rgba(0,0,0,0.55) 50%,
                rgba(0,0,0,0.95) 100%
            );
            pointer-events: none;
            z-index: 1;
        }

        /* Horizontal red rule inside photo (bottom) */
        .photo-rule {
            position: absolute;
            bottom: 0; left: 0; right: 0; height: 1px;
            background: linear-gradient(90deg, #E30613, rgba(227,6,19,0.2), transparent);
            z-index: 2;
            pointer-events: none;
        }

        /* ── Info block ── */
        .info-block {
            flex: 1;
            background: #000;
            display: flex;
            flex-direction: column;
            padding: 15px 20px 26px;
        }

        .category-badge {
            display: inline-flex; align-items: center;
            background: #E30613;
            color: #fff;
            font-size: 8px; font-weight: 800;
            letter-spacing: 0.18em; text-transform: uppercase;
            padding: 4px 10px 3px;
            border-radius: 1px;
            align-self: flex-start;
            margin-bottom: 9px;
        }

        .product-name {
            font-size: 22px; font-weight: 900;
            color: #fff; line-height: 1.06;
            text-transform: uppercase; letter-spacing: -0.01em;
            margin-bottom: 9px;
            max-height: 52px; overflow: hidden;
        }

        .copy-text {
            font-size: 12px; font-weight: 300;
            color: #AAAAAA; line-height: 1.6;
            font-style: italic;
            flex: 1;
            overflow: hidden;
            max-height: 60px;
        }

        .cta-btn {
            display: flex; align-items: center; justify-content: center;
            gap: 9px;
            height: 42px; width: 100%;
            margin-top: 14px;
            background: #E30613;
            color: #fff;
            font-family: 'Inter', Helvetica, Arial, sans-serif;
            font-size: 10px; font-weight: 800;
            letter-spacing: 0.16em; text-transform: uppercase;
            border: none; border-radius: 1px;
            cursor: pointer; overflow: hidden;
            position: relative;
            flex-shrink: 0;
        }

        .cta-arrow { font-size: 14px; line-height: 1; }

        .cta-shine {
            position: absolute; top: 0; left: 0;
            width: 40%; height: 100%;
            background: linear-gradient(105deg,
                transparent,
                rgba(255,255,255,0.24),
                transparent
            );
            pointer-events: none;
        }

        /* ═══════════════════════════════
           SCAN LINE (transition FX)
        ═══════════════════════════════ */
        #scan-line {
            position: absolute;
            top: 58px; left: 0;
            width: 2px; height: 308px;
            background: linear-gradient(180deg,
                transparent 0%,
                #E30613 18%,
                rgba(255,255,255,0.95) 50%,
                #E30613 82%,
                transparent 100%
            );
            z-index: 30;
            opacity: 0;
            pointer-events: none;
        }

        /* ═══════════════════════════════
           CLICK EXIT OVERLAY
        ═══════════════════════════════ */
        #bg-exit { position: absolute; inset: 0; z-index: 10; cursor: pointer; }
    </style>
</head>
<body>
<div id="banner">

    <!-- HEADER -->
    <div id="header">
        <div id="logo">TEKA</div>
    </div>
    <div id="header-rule"></div>
    <div id="frame-counter">1 / 3</div>

    <!-- SCAN LINE -->
    <div id="scan-line"></div>

    <!-- ═══ FRAME 1 ═══ -->
    <div class="frame" id="frame-1">
        <div class="photo-wrap">
            <img id="foto-1" src="" alt="">
            <div class="photo-rule"></div>
        </div>
        <div class="info-block">
            <span class="category-badge" id="badge-1">Hornos</span>
            <div class="product-name" id="name-1">MaestroPizza</div>
            <div class="copy-text" id="copy-1">9 funciones de cocinado para resultados profesionales en tu cocina.</div>
            <button class="cta-btn" id="cta-1">
                <span class="cta-label">Descubre más</span>
                <span class="cta-arrow">→</span>
                <span class="cta-shine"></span>
            </button>
        </div>
    </div>

    <!-- ═══ FRAME 2 ═══ -->
    <div class="frame" id="frame-2">
        <div class="photo-wrap">
            <img id="foto-2" src="" alt="">
            <div class="photo-rule"></div>
        </div>
        <div class="info-block">
            <span class="category-badge" id="badge-2">Campanas</span>
            <div class="product-name" id="name-2">Integra Pro</div>
            <div class="copy-text" id="copy-2">Nada a la vista. Todo en rendimiento. Aspiración perimetral total.</div>
            <button class="cta-btn" id="cta-2">
                <span class="cta-label">Ver producto</span>
                <span class="cta-arrow">→</span>
                <span class="cta-shine"></span>
            </button>
        </div>
    </div>

    <!-- ═══ FRAME 3 ═══ -->
    <div class="frame" id="frame-3">
        <div class="photo-wrap">
            <img id="foto-3" src="" alt="">
            <div class="photo-rule"></div>
        </div>
        <div class="info-block">
            <span class="category-badge" id="badge-3">Fregaderos</span>
            <div class="product-name" id="name-3">Serie NEO</div>
            <div class="copy-text" id="copy-3">El primer fregadero con autolimpieza. Corazón alemán, diseño italiano.</div>
            <button class="cta-btn" id="cta-3">
                <span class="cta-label">Explorar</span>
                <span class="cta-arrow">→</span>
                <span class="cta-shine"></span>
            </button>
        </div>
    </div>

    <div id="bg-exit"></div>
</div>

<script>
    // ⚠️ Actualizar profileId y nombre del perfil cuando el cliente facilite el feed de Studio
    Enabler.setProfileId(0);

    window.onload = function () {
        if (Enabler.isInitialized()) { enablerInitHandler(); }
        else { Enabler.addEventListener(studio.events.StudioEvent.INIT, enablerInitHandler); }
    };

    function enablerInitHandler() {
        if (Enabler.isVisible()) { devDynamicContentInit(); }
        else { Enabler.addEventListener(studio.events.StudioEvent.VISIBLE, devDynamicContentInit); }
    }

    function devDynamicContentInit() {
        // ⚠️ Reemplazar 'Teka_Dynamic' por el nombre exacto del perfil en Studio
        if (typeof dynamicContent !== 'undefined' && dynamicContent.Teka_Dynamic) {
            setupBannerContent(dynamicContent.Teka_Dynamic[0]);
        } else {
            setupBannerContent({
                Prod1_Category: 'Hornos',
                Prod1_Name:     'MaestroPizza',
                Prod1_Copy:     '9 funciones de cocinado para resultados profesionales en tu cocina.',
                Prod1_CTA:      'Descubre más',
                Prod1_URL:      { Url: 'https://www.teka.com' },
                Prod1_Foto:     { Url: 'https://images.unsplash.com/photo-1556909114-f6e7ad7d3136?w=600&q=85' },
                Prod2_Category: 'Campanas',
                Prod2_Name:     'Integra Pro',
                Prod2_Copy:     'Nada a la vista. Todo en rendimiento. Aspiración perimetral total.',
                Prod2_CTA:      'Ver producto',
                Prod2_URL:      { Url: 'https://www.teka.com' },
                Prod2_Foto:     { Url: 'https://images.unsplash.com/photo-1556040220-4096d522378d?w=600&q=85' },
                Prod3_Category: 'Fregaderos',
                Prod3_Name:     'Serie NEO',
                Prod3_Copy:     'El primer fregadero con autolimpieza. Corazón alemán, diseño italiano.',
                Prod3_CTA:      'Explorar',
                Prod3_URL:      { Url: 'https://www.teka.com' },
                Prod3_Foto:     { Url: 'https://images.unsplash.com/photo-1556075798-4825dfaaf498?w=600&q=85' }
            });
        }
    }

    var exitUrls       = [];
    var currentFrameIdx = 0;
    var FRAME_IDS      = ['frame-1', 'frame-2', 'frame-3'];

    function setupBannerContent(data) {
        var prods = [
            { cat: data.Prod1_Category, name: data.Prod1_Name, copy: data.Prod1_Copy, cta: data.Prod1_CTA, foto: data.Prod1_Foto.Url, url: data.Prod1_URL.Url },
            { cat: data.Prod2_Category, name: data.Prod2_Name, copy: data.Prod2_Copy, cta: data.Prod2_CTA, foto: data.Prod2_Foto.Url, url: data.Prod2_URL.Url },
            { cat: data.Prod3_Category, name: data.Prod3_Name, copy: data.Prod3_Copy, cta: data.Prod3_CTA, foto: data.Prod3_Foto.Url, url: data.Prod3_URL.Url }
        ];

        prods.forEach(function (p, i) {
            var n = i + 1;
            document.getElementById('badge-' + n).textContent = p.cat;
            document.getElementById('name-'  + n).textContent = p.name;
            document.getElementById('copy-'  + n).textContent = p.copy;
            document.getElementById('cta-'   + n).querySelector('.cta-label').textContent = p.cta;
            exitUrls.push(p.url);
        });

        var loaded = 0;
        prods.forEach(function (p, i) {
            var img = document.getElementById('foto-' + (i + 1));
            img.onload = img.onerror = function () {
                if (++loaded >= 3) { initBanner(); }
            };
            img.src = p.foto;
        });
    }

    function initBanner() {
        document.getElementById('banner').style.visibility = 'visible';
        setupExits();

        // ── Initial states ──
        gsap.set('#frame-2, #frame-3', { autoAlpha: 0 });
        gsap.set('#header',                    { y: -60, opacity: 0 });
        gsap.set('#header-rule',               { scaleX: 0, transformOrigin: 'left center' });
        gsap.set('#frame-counter',             { opacity: 0 });
        gsap.set('#frame-1 .photo-wrap',       { clipPath: 'inset(0 0 100% 0)' });
        gsap.set('#frame-1 .photo-wrap img',   { scale: 1 });
        gsap.set('#frame-1 .category-badge',   { opacity: 0, x: -14 });
        gsap.set('#frame-1 .product-name',     { opacity: 0, y: 20 });
        gsap.set('#frame-1 .copy-text',        { opacity: 0, y: 16 });
        gsap.set('#frame-1 .cta-btn',          { opacity: 0, y: 12 });
        gsap.set('#frame-1 .cta-shine',        { xPercent: -200 });

        // ── Opening sequence ──
        var tl = gsap.timeline({
            onComplete: function () { setTimeout(nextFrame, 4200); }
        });

        tl
            // Header drops in
            .to('#header',      { y: 0, opacity: 1, duration: 0.55, ease: 'power2.out' })
            .to('#header-rule', { scaleX: 1, duration: 0.42, ease: 'power2.inOut' }, '-=0.28')
            .to('#frame-counter', { opacity: 1, duration: 0.3 }, '-=0.2')

            // Photo wipe down
            .to('#frame-1 .photo-wrap', { clipPath: 'inset(0 0 0% 0)', duration: 0.80, ease: 'expo.inOut' }, '-=0.08')
            // Ken Burns (concurrent with photo reveal)
            .to('#frame-1 .photo-wrap img', { scale: 1.08, duration: 6.5, ease: 'none' }, '<')

            // Info block: aparecen casi al mismo tiempo que la foto empieza a abrirse
            .to('#frame-1 .category-badge', { opacity: 1, x: 0,  duration: 0.22, ease: 'power2.out' }, '-=0.65')
            .to('#frame-1 .product-name',   { opacity: 1, y: 0,  duration: 0.28, ease: 'power2.out' }, '-=0.18')
            .to('#frame-1 .copy-text',      { opacity: 1, y: 0,  duration: 0.24, ease: 'power2.out' }, '-=0.18')
            .to('#frame-1 .cta-btn',        { opacity: 1, y: 0,  duration: 0.24, ease: 'back.out(1.8)' }, '-=0.14')

            // CTA shine sweep
            .to('#frame-1 .cta-shine', { xPercent: 500, duration: 0.70, ease: 'power2.inOut' }, '+=0.08');
    }

    function nextFrame() {
        transitionToFrame((currentFrameIdx + 1) % 3);
    }

    function transitionToFrame(toIdx) {
        var fromId = '#' + FRAME_IDS[currentFrameIdx];
        var toId   = '#' + FRAME_IDS[toIdx];

        document.getElementById('frame-counter').textContent = (toIdx + 1) + ' / 3';

        var tl = gsap.timeline({
            onComplete: function () {
                currentFrameIdx = toIdx;
                setTimeout(nextFrame, 4200);
            }
        });

        // ── EXIT ──────────────────────────────────────
        tl
            // Text exits upward quickly
            .to(fromId + ' .cta-btn',       { opacity: 0, y: -10, duration: 0.22, ease: 'power2.in' })
            .to(fromId + ' .copy-text',      { opacity: 0, y: -7,  duration: 0.2  }, '-=0.14')
            .to(fromId + ' .product-name',   { opacity: 0, y: -7,  duration: 0.2  }, '-=0.16')
            .to(fromId + ' .category-badge', { opacity: 0, x: -10, duration: 0.18 }, '-=0.16')
            // Photo wipes up
            .to(fromId + ' .photo-wrap', { clipPath: 'inset(100% 0 0% 0)', duration: 0.55, ease: 'power2.inOut' }, '-=0.06')

            // Scan line sweeps L→R during photo exit
            .set('#scan-line', { opacity: 1, x: 0 }, '<+=0.12')
            .to('#scan-line',  { x: 310, duration: 0.52, ease: 'power2.inOut' }, '<')

            .set(fromId, { autoAlpha: 0 })
            .set('#scan-line', { opacity: 0, x: 0 })

        // ── ENTER ─────────────────────────────────────
            // Set all entering elements to initial hidden states
            .set(toId, { autoAlpha: 1 })
            .set(toId + ' .photo-wrap',     { clipPath: 'inset(0 0 100% 0)' })
            .set(toId + ' .photo-wrap img', { scale: 1 })
            .set(toId + ' .category-badge', { opacity: 0, x: -14 })
            .set(toId + ' .product-name',   { opacity: 0, y: 20 })
            .set(toId + ' .copy-text',      { opacity: 0, y: 16 })
            .set(toId + ' .cta-btn',        { opacity: 0, y: 12 })
            .set(toId + ' .cta-shine',      { xPercent: -200 })

            // Photo wipes down
            .to(toId + ' .photo-wrap', { clipPath: 'inset(0 0 0% 0)', duration: 0.65, ease: 'expo.inOut' })
            // Ken Burns (concurrent)
            .to(toId + ' .photo-wrap img', { scale: 1.08, duration: 6.5, ease: 'none' }, '<')

            // Info elements: arrancan casi con la foto
            .to(toId + ' .category-badge', { opacity: 1, x: 0, duration: 0.20, ease: 'power2.out' }, '-=0.55')
            .to(toId + ' .product-name',   { opacity: 1, y: 0, duration: 0.26, ease: 'power2.out' }, '-=0.16')
            .to(toId + ' .copy-text',      { opacity: 1, y: 0, duration: 0.22, ease: 'power2.out' }, '-=0.16')
            .to(toId + ' .cta-btn',        { opacity: 1, y: 0, duration: 0.22, ease: 'back.out(1.8)' }, '-=0.12')

            // CTA shine sweep
            .to(toId + ' .cta-shine', { xPercent: 500, duration: 0.62, ease: 'power2.inOut' }, '+=0.08');
    }

    function setupExits() {
        document.getElementById('bg-exit').addEventListener('click', function () {
            Enabler.exitOverride('Product_Click', exitUrls[currentFrameIdx]);
        });
        [1, 2, 3].forEach(function (n, i) {
            document.getElementById('cta-' + n).addEventListener('click', function (e) {
                e.stopPropagation();
                Enabler.exitOverride('CTA_Click', exitUrls[i]);
            });
        });
    }
</script>
</body>
</html>
