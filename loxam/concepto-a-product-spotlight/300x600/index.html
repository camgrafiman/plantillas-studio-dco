<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LOXAM — 300×600 — Product Spotlight</title>

    <script src="https://s0.2mdn.net/ads/studio/Enabler.js"></script>
    <script src="https://s0.2mdn.net/ads/studio/cached_libs/gsap_3.14.2_min.js"></script>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@500;600;800&display=swap" rel="stylesheet">

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body, html { width: 100%; height: 100%; overflow: hidden; background: #fff; }

        #banner {
            position: relative;
            width: 300px;
            height: 600px;
            background: #e9e9e9;
            border: 1px solid #d4d4d4;
            overflow: hidden;
            visibility: hidden;
            user-select: none;
            font-family: 'Montserrat', Arial, sans-serif;
        }

        /* Panel blanco superior con corte diagonal inferior */
        #diag {
            position: absolute;
            left: -20px; top: -50px;
            width: 340px;
            height: 330px;
            background: #fff;
            transform: skewY(-7deg);
            z-index: 1;
            will-change: transform;
        }

        #logo {
            position: absolute;
            top: 20px; left: 20px;
            display: flex;
            align-items: center;
            gap: 5px;
            z-index: 4;
        }
        .logo-icon { height: 19px; fill: #C8102E; }
        .logo-text {
            font-weight: 800;
            font-size: 21px;
            color: #C8102E;
            letter-spacing: -0.01em;
        }

        #title {
            position: absolute;
            top: 64px; left: 20px;
            width: 248px;
            max-height: 96px;
            overflow: hidden;
            font-weight: 800;
            font-size: 27px;
            line-height: 1.08;
            color: #C8102E;
            z-index: 4;
        }

        #subtitle {
            position: absolute;
            top: 168px; left: 20px;
            width: 230px;
            max-height: 60px;
            overflow: hidden;
            font-weight: 600;
            font-size: 13.5px;
            line-height: 1.32;
            color: #1d1d1b;
            z-index: 4;
        }

        /* ── Producto: tarjeta blanca centrada horizontalmente ── */
        #product-wrap {
            position: absolute;
            top: 322px; left: 30px;
            width: 240px;
            height: 240px;
            z-index: 3;
            will-change: transform;
        }

        #product-card {
            width: 100%;
            height: 100%;
            background: #fff;
            border-radius: 14px;
            box-shadow: 0 10px 26px rgba(0,0,0,0.13);
            padding: 16px;
        }

        #product-img {
            width: 100%;
            height: 100%;
            object-fit: contain;
            object-position: center;
            display: block;
        }

        /* ── Badge de precio — encima de la foto de producto ── */
        #price-badge {
            position: absolute;
            top: -18px; right: -8px;
            background: #fff;
            border-left: 4px solid #C8102E;
            border-radius: 7px;
            box-shadow: 0 5px 16px rgba(0,0,0,0.18);
            padding: 7px 13px;
            text-align: center;
            z-index: 5;
            will-change: transform;
        }
        #price-label {
            display: block;
            font-weight: 600;
            font-size: 9px;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            color: #555;
            white-space: nowrap;
        }
        #price-value {
            display: block;
            font-weight: 800;
            font-size: 20px;
            color: #C8102E;
            white-space: nowrap;
        }

        #cta-btn {
            position: absolute;
            left: 20px; top: 244px;
            z-index: 12;
            background: #C8102E;
            border: none;
            border-radius: 2px;
            color: #fff;
            font-family: 'Montserrat', Arial, sans-serif;
            font-weight: 800;
            font-size: 12px;
            letter-spacing: 0.06em;
            text-transform: uppercase;
            padding: 11px 20px;
            cursor: pointer;
            transform: scale(0);
            transform-origin: left center;
            overflow: hidden;
            will-change: transform;
            white-space: nowrap;
        }

        #cta-shine {
            position: absolute;
            top: 0; left: 0;
            width: 40%;
            height: 100%;
            background: linear-gradient(105deg, transparent, rgba(255,255,255,0.45), transparent);
            pointer-events: none;
        }

        #bg-exit {
            position: absolute;
            inset: 0;
            z-index: 10;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <div id="banner">

        <div id="diag"></div>

        <div id="logo">
            <svg class="logo-icon" viewBox="0 0 110 100">
                <polygon points="36,4 4,50 36,96 50,96 18,50 50,4"/>
                <polygon points="74,4 106,50 74,96 60,96 92,50 60,4"/>
            </svg>
            <span class="logo-text">LOXAM</span>
        </div>

        <div id="title"></div>
        <div id="subtitle"></div>

        <div id="product-wrap">
            <div id="product-card">
                <img id="product-img" src="" alt="">
            </div>
            <div id="price-badge">
                <span id="price-label">Alquiler 1 día</span>
                <span id="price-value"></span>
            </div>
        </div>

        <div id="bg-exit"></div>
        <button id="cta-btn"><span id="cta-label"></span><span id="cta-shine"></span></button>

    </div>

    <script>
        window.onload = function () {
            if (Enabler.isInitialized()) {
                enablerInitHandler();
            } else {
                Enabler.addEventListener(studio.events.StudioEvent.INIT, enablerInitHandler);
            }
        };

        function enablerInitHandler() {
            if (Enabler.isVisible()) {
                devDynamicContentInit();
            } else {
                Enabler.addEventListener(studio.events.StudioEvent.VISIBLE, devDynamicContentInit);
            }
        }

        /*
         * Perfil dinámico Studio: Loxam_Feed
         * Campos del feed: Titulo, Subtitulo, CTA, Categoria, Subcategoria,
         * Nombre_Producto, Marca, Modelo, URL_Producto, URL_Imagen,
         * Precio_1_dia, Precio_mas_1_dia, Precio_7_dias.
         * En creatividad solo se pintan: Titulo, Subtitulo, CTA, URL_Imagen,
         * URL_Producto (exit) y Precio_1_dia ("Alquiler 1 día " + precio).
         */
        function devDynamicContentInit() {
            if (typeof dynamicContent !== 'undefined' && dynamicContent.Loxam_Feed) {
                setupBannerContent(dynamicContent.Loxam_Feed[0]);
            } else {
                setupBannerContent({
                    Titulo:           '¿Proyecto de pintura a la vista?',
                    Subtitulo:        'Alquila herramientas desde 10€/día. ¡Hazlo fácil!',
                    CTA:              'Alquila ahora',
                    Categoria:        'Pintura',
                    Subcategoria:     'Pistolas de pintura',
                    Nombre_Producto:  'Equipo de pintura airless',
                    Marca:            'Graco',
                    Modelo:           'ST Max 395',
                    URL_Producto:     { Url: 'https://www.loxam.es' },
                    URL_Imagen:       { Url: 'https://placehold.co/420x420/ffffff/cccccc.png?text=Producto' },
                    Precio_1_dia:     '58.15 €',
                    Precio_mas_1_dia: '20.46 €',
                    Precio_7_dias:    '52.77 €'
                });
            }
        }

        function setupBannerContent(data) {
            document.getElementById('title').textContent       = data.Titulo;
            document.getElementById('subtitle').textContent    = data.Subtitulo;
            document.getElementById('cta-label').textContent   = data.CTA;
            document.getElementById('price-value').textContent = data.Precio_1_dia;

            var img = document.getElementById('product-img');
            function done() {
                document.getElementById('banner').style.visibility = 'visible';
                setupExits(data);
                initAnimations();
            }
            img.onload  = done;
            img.onerror = done;
            img.src = data.URL_Imagen.Url;
        }

        function setupExits(data) {
            var url = data.URL_Producto.Url;
            document.getElementById('bg-exit').addEventListener('click', function () {
                Enabler.exitOverride('Background_Click', url);
            });
            document.getElementById('cta-btn').addEventListener('click', function (e) {
                e.stopPropagation();
                Enabler.exitOverride('CTA_Click', url);
            });
        }

        function initAnimations() {
            gsap.set('#diag',         { yPercent: -130 });
            gsap.set(['#logo', '#title', '#subtitle'], { opacity: 0, y: 18 });
            gsap.set('#product-wrap', { opacity: 0, y: -50, scale: 0.75 });
            gsap.set('#price-badge',  { opacity: 0, scale: 0.3, rotation: 10 });
            gsap.set('#cta-btn',      { scale: 0 });
            gsap.set('#cta-shine',    { xPercent: -160 });

            gsap.timeline({ defaults: { ease: 'power3.out' } })
                .to('#diag',         { yPercent: 0, duration: 0.6, ease: 'power2.out' })
                .to('#logo',         { opacity: 1, y: 0, duration: 0.4 },  '-=0.25')
                .to('#title',        { opacity: 1, y: 0, duration: 0.55 }, '-=0.2')
                .to('#subtitle',     { opacity: 1, y: 0, duration: 0.45 }, '-=0.3')
                .to('#product-wrap', { opacity: 1, y: 0, scale: 1, duration: 0.7, ease: 'back.out(1.4)' }, '-=0.25')
                .to('#price-badge',  { opacity: 1, scale: 1, rotation: -4, duration: 0.5, ease: 'back.out(2)' }, '-=0.15')
                .to('#cta-btn',      { scale: 1, duration: 0.4, ease: 'back.out(1.6)' }, '-=0.2')
                .to('#cta-shine',    { xPercent: 350, duration: 0.6, ease: 'power2.inOut' }, '+=0.2')
                .to('#product-wrap', { y: -7, duration: 0.9, ease: 'sine.inOut', repeat: 3, yoyo: true }, '+=0.1')
                .to('#cta-btn',      { scale: 1.06, duration: 0.3, repeat: 3, yoyo: true, ease: 'power1.inOut' }, '-=2.4');
        }
    </script>
</body>
</html>
