<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DreamPlace Hotels — 160×600 — Room Accordion</title>

    <script src="https://s0.2mdn.net/ads/studio/Enabler.js"></script>
    <script src="https://s0.2mdn.net/ads/studio/cached_libs/gsap_3.14.2_min.js"></script>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Raleway:wght@400;700&family=Montserrat:wght@600&display=swap" rel="stylesheet">

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body, html { width: 100%; height: 100%; overflow: hidden; background: #000; }

        #banner {
            position: relative;
            width: 160px;
            height: 600px;
            border: 1px solid #1a1a1a;
            overflow: hidden;
            visibility: hidden;
            user-select: none;
        }

        #accordion {
            position: absolute;
            top: 0; left: 0;
            width: 100%;
            height: 490px;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .panel {
            flex: none;
            width: 100%;
            height: 122px;
            position: relative;
            overflow: hidden;
            cursor: pointer;
        }

        .room-photo {
            width: 100%;
            height: 100%;
            object-fit: cover;
            object-position: center 40%;
            display: block;
        }

        .dim-overlay {
            position: absolute;
            inset: 0;
            background: rgba(0,0,0,0.5);
            opacity: 0;
            z-index: 1;
            pointer-events: none;
        }

        .active-bar {
            position: absolute;
            left: 0; top: 0;
            width: 3px;
            height: 100%;
            opacity: 0;
            z-index: 2;
            pointer-events: none;
        }

        .room-label {
            position: absolute;
            bottom: 0; left: 0;
            width: 100%;
            padding: 45px 10px 10px;
            background: linear-gradient(transparent, rgba(0,0,0,0.68));
            opacity: 0;
            z-index: 3;
            pointer-events: none;
        }

        .room-name {
            font-family: 'Raleway', Arial, sans-serif;
            font-weight: 700;
            font-size: 10px;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            color: #fff;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        #color-bar {
            position: absolute;
            bottom: 0; left: 0;
            width: 100%;
            height: 110px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 10px 12px;
            gap: 6px;
        }

        #logo-container {
            width: 100px;
            height: 44px;
            opacity: 0;
            will-change: opacity;
        }

        #hotel-logo {
            width: 100%;
            height: 100%;
            object-fit: contain;
            object-position: center;
        }

        #hotel-name {
            font-family: 'Raleway', Arial, sans-serif;
            font-weight: 400;
            font-size: 7px;
            letter-spacing: 0.22em;
            text-transform: uppercase;
            color: rgba(255,255,255,0.72);
            white-space: nowrap;
            overflow: hidden;
            text-align: center;
            opacity: 0;
        }

        #cta-btn {
            position: absolute;
            bottom: 12px;
            left: 50%;
            transform: translateX(-50%) scale(0);
            transform-origin: center bottom;
            z-index: 11;
            background: transparent;
            border: 1.5px solid rgba(255,255,255,0.85);
            color: #fff;
            font-family: 'Montserrat', Arial, sans-serif;
            font-weight: 600;
            font-size: 7px;
            letter-spacing: 0.15em;
            text-transform: uppercase;
            padding: 5px 10px;
            cursor: pointer;
            will-change: transform;
            white-space: nowrap;
        }

        #bg-exit {
            position: absolute;
            inset: 0;
            z-index: 10;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <div id="banner">

        <div id="accordion">
            <div class="panel" data-index="0">
                <img class="room-photo" src="" alt="">
                <div class="dim-overlay"></div>
                <div class="active-bar"></div>
                <div class="room-label"><span class="room-name"></span></div>
            </div>
            <div class="panel" data-index="1">
                <img class="room-photo" src="" alt="">
                <div class="dim-overlay"></div>
                <div class="active-bar"></div>
                <div class="room-label"><span class="room-name"></span></div>
            </div>
            <div class="panel" data-index="2">
                <img class="room-photo" src="" alt="">
                <div class="dim-overlay"></div>
                <div class="active-bar"></div>
                <div class="room-label"><span class="room-name"></span></div>
            </div>
            <div class="panel" data-index="3">
                <img class="room-photo" src="" alt="">
                <div class="dim-overlay"></div>
                <div class="active-bar"></div>
                <div class="room-label"><span class="room-name"></span></div>
            </div>
        </div>

        <div id="color-bar">
            <div id="logo-container">
                <img id="hotel-logo" src="" alt="">
            </div>
            <span id="hotel-name"></span>
        </div>

        <button id="cta-btn"></button>
        <div id="bg-exit"></div>

    </div>

    <script>
        var ACCORDION_H = 490;
        var NUM_PANELS  = 4;
        var DEFAULT_H   = 122;
        var EXPANDED_H  = 280;
        var COMPACT_H   = (ACCORDION_H - EXPANDED_H) / (NUM_PANELS - 1);

        var panels      = Array.from(document.querySelectorAll('.panel'));
        var accordion   = document.getElementById('accordion');
        var currentIdx  = -1;
        var autoTimer   = null;
        var autoSeqIdx  = 0;

        window.onload = function () {
            if (Enabler.isInitialized()) {
                enablerInitHandler();
            } else {
                Enabler.addEventListener(studio.events.StudioEvent.INIT, enablerInitHandler);
            }
        };

        function enablerInitHandler() {
            if (Enabler.isVisible()) {
                devDynamicContentInit();
            } else {
                Enabler.addEventListener(studio.events.StudioEvent.VISIBLE, devDynamicContentInit);
            }
        }

        function devDynamicContentInit() {
            if (typeof dynamicContent !== 'undefined' && dynamicContent.DreamPlace_Retargeting) {
                setupBannerContent(dynamicContent.DreamPlace_Retargeting[0]);
            } else {
                setupBannerContent({
                    Hotel_Name:   'Gran Tagoro',
                    Hotel_Color:  '#E8823A',
                    Hotel_Logo:   { Url: 'https://placehold.co/100x44/E8823A/fff?text=LOGO' },
                    Room_1_Photo: { Url: 'https://placehold.co/160x375/1a1a2e/fff?text=Suite+Deluxe' },
                    Room_1_Name:  'Suite Deluxe',
                    Room_2_Photo: { Url: 'https://placehold.co/160x375/16213e/fff?text=Junior+Suite' },
                    Room_2_Name:  'Junior Suite',
                    Room_3_Photo: { Url: 'https://placehold.co/160x375/0f3460/fff?text=Garden+Room' },
                    Room_3_Name:  'Garden Room',
                    Room_4_Photo: { Url: 'https://placehold.co/160x375/533483/fff?text=Ocean+View' },
                    Room_4_Name:  'Ocean View',
                    CTA_Text:     'Reserva ahora',
                    Landing_URL:  { Url: 'https://www.dreamplacehotels.com' }
                });
            }
        }

        function setupBannerContent(data) {
            document.getElementById('color-bar').style.background = data.Hotel_Color;
            document.getElementById('hotel-name').textContent     = data.Hotel_Name;
            document.getElementById('cta-btn').textContent        = data.CTA_Text;
            document.getElementById('hotel-logo').src             = data.Hotel_Logo.Url;

            var rooms = [
                { photo: data.Room_1_Photo.Url, name: data.Room_1_Name },
                { photo: data.Room_2_Photo.Url, name: data.Room_2_Name },
                { photo: data.Room_3_Photo.Url, name: data.Room_3_Name },
                { photo: data.Room_4_Photo.Url, name: data.Room_4_Name }
            ];

            panels.forEach(function(panel, i) {
                panel.querySelector('.room-photo').src              = rooms[i].photo;
                panel.querySelector('.room-name').textContent       = rooms[i].name;
                panel.querySelector('.active-bar').style.background = data.Hotel_Color;
            });

            var loaded = 0;
            rooms.forEach(function(room) {
                var img = new Image();
                function done() {
                    if (++loaded === rooms.length) {
                        document.getElementById('banner').style.visibility = 'visible';
                        setupExits(data);
                        initAnimations();
                    }
                }
                img.onload = done;
                img.onerror = done;
                img.src = room.photo;
            });
        }

        function setupExits(data) {
            var url = data.Landing_URL.Url;
            document.getElementById('bg-exit').addEventListener('click', function () {
                Enabler.exitOverride('Background_Click', url);
            });
            document.getElementById('cta-btn').addEventListener('click', function (e) {
                e.stopPropagation();
                Enabler.exitOverride('CTA_Click', url);
            });
        }

        function expandPanel(index) {
            panels.forEach(function(panel, i) {
                var active = (i === index);
                gsap.to(panel, { height: active ? EXPANDED_H : COMPACT_H, duration: 0.5, ease: 'power2.inOut' });
                gsap.to(panel.querySelector('.dim-overlay'),  { opacity: active ? 0 : 1, duration: 0.4 });
                gsap.to(panel.querySelector('.active-bar'),   { opacity: active ? 1 : 0, duration: 0.25 });
                gsap.to(panel.querySelector('.room-label'),   { opacity: active ? 1 : 0, duration: 0.35 });
                if (active) {
                    gsap.fromTo(panel.querySelector('.room-photo'),
                        { scale: 1.06 }, { scale: 1, duration: 0.7, ease: 'power2.out' });
                }
            });
            currentIdx = index;
        }

        function stopAuto() {
            if (autoTimer) { clearTimeout(autoTimer); autoTimer = null; }
        }

        function showCTA() {
            gsap.set('#cta-btn', { xPercent: -50, scale: 0 });
            gsap.to('#cta-btn',  { scale: 1, duration: 0.42, ease: 'back.out(1.5)' });
            gsap.to('#cta-btn',  { scale: 1.06, repeat: 2, yoyo: true, duration: 0.22, delay: 0.9, ease: 'power1.inOut' });
        }

        function startAutoSequence() {
            autoSeqIdx = 0;
            expandPanel(0);
            function advance() {
                autoSeqIdx++;
                if (autoSeqIdx >= NUM_PANELS) { showCTA(); return; }
                expandPanel(autoSeqIdx);
                autoTimer = setTimeout(advance, 3200);
            }
            autoTimer = setTimeout(advance, 3200);
        }

        accordion.addEventListener('mouseover', function(e) {
            var panel = e.target.closest('.panel');
            if (!panel) return;
            var idx = parseInt(panel.dataset.index, 10);
            if (idx === currentIdx) return;
            stopAuto();
            expandPanel(idx);
            gsap.set('#cta-btn',  { xPercent: -50, scale: 0 });
            gsap.to('#cta-btn',   { scale: 1, duration: 0.3, ease: 'back.out(1.5)' });
        });

        function initAnimations() {
            gsap.set(panels,            { height: 0 });
            gsap.set('#logo-container', { opacity: 0 });
            gsap.set('#hotel-name',     { opacity: 0 });
            gsap.set('#cta-btn',        { xPercent: -50, scale: 0 });

            gsap.timeline({ onComplete: startAutoSequence })
                .to(panels, { height: DEFAULT_H, duration: 0.42, stagger: 0.1, ease: 'power2.out' })
                .to('#logo-container', { opacity: 1, duration: 0.38 }, '-=0.2')
                .to('#hotel-name',     { opacity: 1, duration: 0.32 }, '-=0.15');
        }
    </script>
</body>
</html>
