<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DreamPlace Hotels — 320×100 — Room Accordion</title>

    <script src="https://s0.2mdn.net/ads/studio/Enabler.js"></script>
    <script src="https://s0.2mdn.net/ads/studio/cached_libs/gsap_3.14.2_min.js"></script>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Raleway:wght@400;700&family=Montserrat:wght@600&display=swap" rel="stylesheet">

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body, html { width: 100%; height: 100%; overflow: hidden; background: #000; }

        #banner {
            position: relative;
            width: 320px;
            height: 100px;
            border: 1px solid #1a1a1a;
            overflow: hidden;
            visibility: hidden;
            user-select: none;
        }

        /* ── Acordeón horizontal — ocupa todo el banner ── */
        #accordion {
            position: absolute;
            inset: 0;
            display: flex;
            flex-direction: row;
            overflow: hidden;
            z-index: 11;
        }

        .panel {
            flex: none;
            width: 80px;
            height: 100%;
            position: relative;
            overflow: hidden;
            cursor: pointer;
        }

        .room-photo {
            width: 100%;
            height: 100%;
            object-fit: cover;
            object-position: center 40%;
            display: block;
        }

        .dim-overlay {
            position: absolute;
            inset: 0;
            background: rgba(0,0,0,0.52);
            opacity: 0;
            z-index: 1;
            pointer-events: none;
        }

        /*
         * Indicador activo: barra horizontal en la parte superior (acordeón horizontal).
         * Color se inyecta desde JS con data.Hotel_Color.
         */
        .active-bar {
            position: absolute;
            top: 0; left: 0;
            width: 100%;
            height: 3px;
            opacity: 0;
            z-index: 2;
            pointer-events: none;
        }

        .room-label {
            position: absolute;
            bottom: 0; left: 0;
            width: 100%;
            padding: 18px 8px 6px;
            background: linear-gradient(transparent, rgba(0,0,0,0.7));
            opacity: 0;
            z-index: 3;
            pointer-events: none;
        }

        .room-name {
            font-family: 'Raleway', Arial, sans-serif;
            font-weight: 700;
            font-size: 7.5px;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            color: #fff;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        /*
         * Logo y nombre del hotel superpuestos sobre el primer panel.
         * Gradiente izquierda → derecha para contraste del logo.
         * Logo: top: 31px = (100px - 38px) / 2. Límite derecho: 10+60=70px. Sin colisión
         * con panel activo (mínimo 80px de ancho incluso en estado compacto).
         */
        #logo-shadow {
            position: absolute;
            top: 0; left: 0;
            width: 90px;
            height: 100%;
            background: linear-gradient(90deg, rgba(0,0,0,0.55) 0%, transparent 100%);
            z-index: 4;
            pointer-events: none;
        }

        #logo-container {
            position: absolute;
            top: 31px;
            left: 10px;
            width: 60px;
            height: 38px;
            z-index: 5;
            opacity: 0;
            will-change: opacity;
        }

        #hotel-logo {
            width: 100%;
            height: 100%;
            object-fit: contain;
            object-position: left center;
        }

        /* ── CTA — esquina inferior derecha ── */
        #cta-btn {
            position: absolute;
            right: 10px;
            bottom: 10px;
            z-index: 12;
            background: transparent;
            border: 1.5px solid rgba(255,255,255,0.85);
            color: #fff;
            font-family: 'Montserrat', Arial, sans-serif;
            font-weight: 600;
            font-size: 7px;
            letter-spacing: 0.14em;
            text-transform: uppercase;
            padding: 4px 10px;
            cursor: pointer;
            transform: scale(0);
            transform-origin: right bottom;
            will-change: transform;
            white-space: nowrap;
        }

        #bg-exit {
            position: absolute;
            inset: 0;
            z-index: 10;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <div id="banner">

        <div id="accordion">
            <div class="panel" data-index="0">
                <img class="room-photo" src="" alt="">
                <div class="dim-overlay"></div>
                <div class="active-bar"></div>
                <div class="room-label"><span class="room-name"></span></div>
            </div>
            <div class="panel" data-index="1">
                <img class="room-photo" src="" alt="">
                <div class="dim-overlay"></div>
                <div class="active-bar"></div>
                <div class="room-label"><span class="room-name"></span></div>
            </div>
            <div class="panel" data-index="2">
                <img class="room-photo" src="" alt="">
                <div class="dim-overlay"></div>
                <div class="active-bar"></div>
                <div class="room-label"><span class="room-name"></span></div>
            </div>
            <div class="panel" data-index="3">
                <img class="room-photo" src="" alt="">
                <div class="dim-overlay"></div>
                <div class="active-bar"></div>
                <div class="room-label"><span class="room-name"></span></div>
            </div>
        </div>

        <!-- Logo superpuesto sobre acordeón -->
        <div id="logo-shadow"></div>
        <div id="logo-container">
            <img id="hotel-logo" src="" alt="">
        </div>

        <button id="cta-btn"></button>
        <div id="bg-exit"></div>

    </div>

    <script>
        var ACCORDION_W = 320;
        var NUM_PANELS  = 4;
        var DEFAULT_W   = 80;    // 4 × 80 = 320
        var EXPANDED_W  = 155;
        var COMPACT_W   = (ACCORDION_W - EXPANDED_W) / (NUM_PANELS - 1); // 55

        var panels      = Array.from(document.querySelectorAll('.panel'));
        var accordion   = document.getElementById('accordion');
        var currentIdx  = -1;
        var autoTimer   = null;
        var autoSeqIdx  = 0;

        window.onload = function () {
            if (Enabler.isInitialized()) {
                enablerInitHandler();
            } else {
                Enabler.addEventListener(studio.events.StudioEvent.INIT, enablerInitHandler);
            }
        };

        function enablerInitHandler() {
            if (Enabler.isVisible()) {
                devDynamicContentInit();
            } else {
                Enabler.addEventListener(studio.events.StudioEvent.VISIBLE, devDynamicContentInit);
            }
        }

        function devDynamicContentInit() {
            if (typeof dynamicContent !== 'undefined' && dynamicContent.DreamPlace_Retargeting) {
                setupBannerContent(dynamicContent.DreamPlace_Retargeting[0]);
            } else {
                setupBannerContent({
                    Hotel_Name:   'Gran Tagoro',
                    Hotel_Color:  '#E8823A',
                    Hotel_Logo:   { Url: 'https://placehold.co/60x38/E8823A/fff?text=LOGO' },
                    Room_1_Photo: { Url: 'https://placehold.co/320x100/1a1a2e/fff?text=Suite+Deluxe' },
                    Room_1_Name:  'Suite Deluxe',
                    Room_2_Photo: { Url: 'https://placehold.co/320x100/16213e/fff?text=Junior+Suite' },
                    Room_2_Name:  'Junior Suite',
                    Room_3_Photo: { Url: 'https://placehold.co/320x100/0f3460/fff?text=Garden+Room' },
                    Room_3_Name:  'Garden Room',
                    Room_4_Photo: { Url: 'https://placehold.co/320x100/533483/fff?text=Ocean+View' },
                    Room_4_Name:  'Ocean View',
                    CTA_Text:     'Reserva ahora',
                    Landing_URL:  { Url: 'https://www.dreamplacehotels.com' }
                });
            }
        }

        function setupBannerContent(data) {
            document.getElementById('hotel-logo').src = data.Hotel_Logo.Url;
            document.getElementById('cta-btn').textContent = data.CTA_Text;

            var rooms = [
                { photo: data.Room_1_Photo.Url, name: data.Room_1_Name },
                { photo: data.Room_2_Photo.Url, name: data.Room_2_Name },
                { photo: data.Room_3_Photo.Url, name: data.Room_3_Name },
                { photo: data.Room_4_Photo.Url, name: data.Room_4_Name }
            ];

            panels.forEach(function(panel, i) {
                panel.querySelector('.room-photo').src              = rooms[i].photo;
                panel.querySelector('.room-name').textContent       = rooms[i].name;
                panel.querySelector('.active-bar').style.background = data.Hotel_Color;
            });

            var loaded = 0;
            rooms.forEach(function(room) {
                var img = new Image();
                function done() {
                    if (++loaded === rooms.length) {
                        document.getElementById('banner').style.visibility = 'visible';
                        setupExits(data);
                        initAnimations();
                    }
                }
                img.onload = done;
                img.onerror = done;
                img.src = room.photo;
            });
        }

        function setupExits(data) {
            var url = data.Landing_URL.Url;
            document.getElementById('bg-exit').addEventListener('click', function () {
                Enabler.exitOverride('Background_Click', url);
            });
            panels.forEach(function(panel) {
                panel.addEventListener('click', function() {
                    Enabler.exitOverride('Background_Click', url);
                });
            });
            document.getElementById('cta-btn').addEventListener('click', function (e) {
                e.stopPropagation();
                Enabler.exitOverride('CTA_Click', url);
            });
        }

        function expandPanel(index) {
            panels.forEach(function(panel, i) {
                var active = (i === index);
                gsap.to(panel, { width: active ? EXPANDED_W : COMPACT_W, duration: 0.45, ease: 'power2.inOut' });
                gsap.to(panel.querySelector('.dim-overlay'),  { opacity: active ? 0 : 1,  duration: 0.4 });
                gsap.to(panel.querySelector('.active-bar'),   { opacity: active ? 1 : 0,  duration: 0.25 });
                gsap.to(panel.querySelector('.room-label'),   { opacity: active ? 1 : 0,  duration: 0.3 });
                if (active) {
                    gsap.fromTo(panel.querySelector('.room-photo'),
                        { scale: 1.06 }, { scale: 1, duration: 0.6, ease: 'power2.out' });
                }
            });
            currentIdx = index;
        }

        function stopAuto() {
            if (autoTimer) { clearTimeout(autoTimer); autoTimer = null; }
        }

        function showCTA() {
            gsap.to('#cta-btn', { scale: 1, duration: 0.38, ease: 'back.out(1.5)' });
            gsap.to('#cta-btn', { scale: 1.06, repeat: 2, yoyo: true, duration: 0.2, delay: 0.9, ease: 'power1.inOut' });
        }

        function startAutoSequence() {
            autoSeqIdx = 0;
            expandPanel(0);
            function advance() {
                autoSeqIdx++;
                if (autoSeqIdx >= NUM_PANELS) { showCTA(); return; }
                expandPanel(autoSeqIdx);
                autoTimer = setTimeout(advance, 2800);
            }
            autoTimer = setTimeout(advance, 2800);
        }

        accordion.addEventListener('mouseover', function(e) {
            var panel = e.target.closest('.panel');
            if (!panel) return;
            var idx = parseInt(panel.dataset.index, 10);
            if (idx === currentIdx) return;
            stopAuto();
            expandPanel(idx);
            gsap.to('#cta-btn', { scale: 1, duration: 0.3, ease: 'back.out(1.5)' });
        });

        function initAnimations() {
            gsap.set(panels,            { width: 0 });
            gsap.set('#logo-container', { opacity: 0 });
            gsap.set('#cta-btn',        { scale: 0 });

            gsap.timeline({ onComplete: startAutoSequence })
                .to(panels, { width: DEFAULT_W, duration: 0.38, stagger: 0.1, ease: 'power2.out' })
                .to('#logo-container', { opacity: 1, duration: 0.35 }, '-=0.2');
        }
    </script>
</body>
</html>
