<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DreamPlace Hotels — 300×600 — Cinematic Reveal</title>

    <!-- 1. Google Studio Enabler SDK -->
    <script src="https://s0.2mdn.net/ads/studio/Enabler.js"></script>

    <!-- 2. GSAP desde CDN autorizado por Google Studio -->
    <script src="https://s0.2mdn.net/ads/studio/cached_libs/gsap_3.14.2_min.js"></script>

    <!-- 3. Tipografía corporativa -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Raleway:wght@400;700&family=Montserrat:wght@600&display=swap" rel="stylesheet">

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body, html { width: 100%; height: 100%; overflow: hidden; background: #000; }

        #banner {
            position: relative;
            width: 300px;
            height: 600px;
            border: 1px solid #1a1a1a; /* Obligatorio por política de AdServer */
            overflow: hidden;
            visibility: hidden;
            user-select: none;
        }

        #bg-layer {
            position: absolute;
            inset: 0;
            clip-path: inset(0 100% 0 0);
            will-change: clip-path;
        }

        #hotel-bg {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }

        .logo-shadow {
            position: absolute;
            top: 0; left: 0;
            width: 100%;
            height: 130px;
            background: linear-gradient(180deg, rgba(0,0,0,0.52) 0%, transparent 100%);
            z-index: 2;
            pointer-events: none;
        }

        #logo-container {
            position: absolute;
            top: 20px;
            left: 50%;
            transform: translateX(-50%) translateY(-10px);
            width: 95px;
            height: 72px;
            z-index: 5;
            opacity: 0;
            will-change: transform, opacity;
        }

        #hotel-logo {
            width: 100%;
            height: 100%;
            object-fit: contain;
            object-position: center top;
        }

        #color-bar {
            position: absolute;
            bottom: 0; left: 0;
            width: 100%;
            height: 178px;
            padding: 18px 16px 0;
            transform: scaleY(0);
            transform-origin: bottom center;
            will-change: transform;
            z-index: 3;
        }

        .hotel-name {
            font-family: 'Raleway', Arial, sans-serif;
            font-weight: 400;
            font-size: 8.5px;
            letter-spacing: 0.26em;
            text-transform: uppercase;
            color: rgba(255, 255, 255, 0.68);
            margin-bottom: 8px;
            white-space: nowrap;
            overflow: hidden;
        }

        .headline {
            font-family: 'Raleway', Arial, sans-serif;
            font-weight: 700;
            font-size: 18px;
            line-height: 1.2;
            color: #fff;
            margin-bottom: 8px;
        }

        .subheadline {
            font-family: 'Raleway', Arial, sans-serif;
            font-weight: 400;
            font-size: 11.5px;
            line-height: 1.45;
            color: rgba(255, 255, 255, 0.82);
        }

        #cta-btn {
            position: absolute;
            bottom: 18px;
            left: 16px;
            z-index: 11;
            background: transparent;
            border: 1.5px solid rgba(255, 255, 255, 0.85);
            color: #fff;
            font-family: 'Montserrat', Arial, sans-serif;
            font-weight: 600;
            font-size: 8.5px;
            letter-spacing: 0.18em;
            text-transform: uppercase;
            padding: 7px 16px;
            cursor: pointer;
            transform: scale(0);
            transform-origin: left center;
            will-change: transform;
            white-space: nowrap;
        }

        #bg-exit {
            position: absolute;
            inset: 0;
            z-index: 10;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <div id="banner">
        <div id="bg-layer"><img id="hotel-bg" src="" alt=""></div>
        <div class="logo-shadow"></div>
        <div id="logo-container"><img id="hotel-logo" src="" alt=""></div>
        <div id="color-bar">
            <span class="hotel-name" id="hotel-name"></span>
            <h2 class="headline" id="headline"></h2>
            <p class="subheadline" id="subheadline"></p>
        </div>
        <button id="cta-btn"></button>
        <div id="bg-exit"></div>
    </div>

    <script>
        window.onload = function () {
            if (Enabler.isInitialized()) { enablerInitHandler(); }
            else { Enabler.addEventListener(studio.events.StudioEvent.INIT, enablerInitHandler); }
        };
        function enablerInitHandler() {
            if (Enabler.isVisible()) { devDynamicContentInit(); }
            else { Enabler.addEventListener(studio.events.StudioEvent.VISIBLE, devDynamicContentInit); }
        }
        function devDynamicContentInit() {
            // NOTA: Reemplazar 'DreamPlace_Retargeting' por el nombre exacto del perfil en Google Studio
            if (typeof dynamicContent !== 'undefined' && dynamicContent.DreamPlace_Retargeting) {
                setupBannerContent(dynamicContent.DreamPlace_Retargeting[0]);
            } else {
                console.warn('Studio dynamic content no disponible — cargando datos de testing.');
                setupBannerContent({
                    Hotel_Name: 'Gran Tagoro', Hotel_Color: '#E8823A',
                    Hotel_Logo: { Url: 'https://placehold.co/95x72/E8823A/ffffff?text=LOGO' },
                    Background_Img: { Url: 'https://placehold.co/300x600/111827/ffffff?text=Hotel+Photo' },
                    Headline: 'Tu escapada perfecta te espera', Subheadline: 'Lanzarote, frente al mar',
                    CTA_Text: 'Reserva ahora', Landing_URL: { Url: 'https://www.dreamplacehotels.com' }
                });
            }
        }
        function setupBannerContent(data) {
            document.getElementById('color-bar').style.background  = data.Hotel_Color;
            document.getElementById('hotel-name').textContent      = data.Hotel_Name;
            document.getElementById('headline').textContent        = data.Headline;
            document.getElementById('subheadline').textContent     = data.Subheadline;
            document.getElementById('cta-btn').textContent         = data.CTA_Text;
            document.getElementById('hotel-logo').src              = data.Hotel_Logo.Url;
            const bgImg = new Image();
            bgImg.onload = function () {
                document.getElementById('hotel-bg').src = bgImg.src;
                document.getElementById('banner').style.visibility = 'visible';
                setupExits(data); initAnimations();
            };
            bgImg.src = data.Background_Img.Url;
        }
        function setupExits(data) {
            const url = data.Landing_URL.Url;
            document.getElementById('bg-exit').addEventListener('click', function () { Enabler.exitOverride('Background_Click', url); });
            document.getElementById('cta-btn').addEventListener('click', function (e) { e.stopPropagation(); Enabler.exitOverride('CTA_Click', url); });
        }
        function initAnimations() {
            const tl = gsap.timeline({ defaults: { ease: 'power2.out' } });
            tl
                .to('#bg-layer', { clipPath: 'inset(0 0% 0 0)', duration: 1.7, ease: 'power3.inOut' })
                .to('#color-bar', { scaleY: 1, duration: 0.6, ease: 'power3.out' }, '-=0.55')
                .to('#logo-container', { opacity: 1, y: 0, duration: 0.45 }, '-=0.4')
                .from('#hotel-name', { opacity: 0, y: 8, duration: 0.32 }, '-=0.1')
                .from('#headline', { opacity: 0, y: 10, duration: 0.38 }, '-=0.05')
                .from('#subheadline', { opacity: 0, y: 8, duration: 0.32 }, '-=0.1')
                .to('#cta-btn', { scale: 1, duration: 0.42, ease: 'back.out(1.5)' }, '-=0.1')
                .to('#cta-btn', { scale: 1.06, repeat: 2, yoyo: true, duration: 0.22, delay: 0.9, ease: 'power1.inOut' });
        }
    </script>
</body>
</html>
