<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DreamPlace Hotels — 160×600 — Color Signature</title>
    <script src="https://s0.2mdn.net/ads/studio/Enabler.js"></script>
    <script src="https://s0.2mdn.net/ads/studio/cached_libs/gsap_3.14.2_min.js"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Raleway:wght@400;700&family=Montserrat:wght@600&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body, html { width: 100%; height: 100%; overflow: hidden; background: #000; }
        #banner { position: relative; width: 160px; height: 600px; border: 1px solid #1a1a1a; overflow: hidden; visibility: hidden; user-select: none; }
        #bg-layer { position: absolute; inset: 0; }
        #hotel-bg { width: 100%; height: 100%; object-fit: cover; display: block; transform: scale(1.08); transform-origin: center; will-change: transform; }
        .logo-shadow { position: absolute; top: 0; left: 0; width: 100%; height: 120px; background: linear-gradient(180deg, rgba(0,0,0,0.58) 0%, transparent 100%); z-index: 2; pointer-events: none; }
        #logo-container { position: absolute; top: 16px; left: 50%; transform: translateX(-50%) translateY(-10px); width: 110px; height: 62px; z-index: 5; opacity: 0; will-change: transform, opacity; }
        #hotel-logo { width: 100%; height: 100%; object-fit: contain; object-position: center top; }
        #color-bar { position: absolute; bottom: 0; left: 0; width: 100%; height: 215px; padding: 16px 14px 0; transform: translateY(215px); will-change: transform; z-index: 3; }
        .hotel-name { font-family: 'Raleway', Arial, sans-serif; font-weight: 400; font-size: 7.5px; letter-spacing: 0.24em; text-transform: uppercase; color: rgba(255,255,255,0.68); margin-bottom: 6px; white-space: nowrap; overflow: hidden; }
        .separator { width: 100%; height: 1px; background: rgba(255,255,255,0.28); margin-bottom: 7px; transform: scaleX(0); transform-origin: left center; will-change: transform; }
        .headline { font-family: 'Raleway', Arial, sans-serif; font-weight: 700; font-size: 14px; line-height: 1.22; color: #fff; margin-bottom: 7px; }
        .subheadline { font-family: 'Raleway', Arial, sans-serif; font-weight: 400; font-size: 10px; line-height: 1.45; color: rgba(255,255,255,0.8); }
        #cta-btn { position: absolute; bottom: 16px; left: 14px; z-index: 11; background: transparent; border: 1.5px solid rgba(255,255,255,0.85); color: #fff; font-family: 'Montserrat', Arial, sans-serif; font-weight: 600; font-size: 7.5px; letter-spacing: 0.17em; text-transform: uppercase; padding: 6px 12px; cursor: pointer; transform: scale(0); transform-origin: left center; will-change: transform; white-space: nowrap; }
        #bg-exit { position: absolute; inset: 0; z-index: 10; cursor: pointer; }
    </style>
</head>
<body>
    <div id="banner">
        <div id="bg-layer"><img id="hotel-bg" src="" alt=""></div>
        <div class="logo-shadow"></div>
        <div id="logo-container"><img id="hotel-logo" src="" alt=""></div>
        <div id="color-bar">
            <span class="hotel-name" id="hotel-name"></span>
            <div class="separator" id="separator"></div>
            <h2 class="headline" id="headline"></h2>
            <p class="subheadline" id="subheadline"></p>
        </div>
        <button id="cta-btn"></button>
        <div id="bg-exit"></div>
    </div>
    <script>
        window.onload = function () {
            if (Enabler.isInitialized()) { enablerInitHandler(); }
            else { Enabler.addEventListener(studio.events.StudioEvent.INIT, enablerInitHandler); }
        };
        function enablerInitHandler() {
            if (Enabler.isVisible()) { devDynamicContentInit(); }
            else { Enabler.addEventListener(studio.events.StudioEvent.VISIBLE, devDynamicContentInit); }
        }
        function devDynamicContentInit() {
            // NOTA: Reemplazar 'DreamPlace_Retargeting' por el nombre exacto del perfil en Google Studio
            if (typeof dynamicContent !== 'undefined' && dynamicContent.DreamPlace_Retargeting) {
                setupBannerContent(dynamicContent.DreamPlace_Retargeting[0]);
            } else {
                setupBannerContent({ Hotel_Name: 'Gran Tagoro', Hotel_Color: '#E8823A', Hotel_Logo: { Url: 'https://placehold.co/110x62/E8823A/ffffff?text=LOGO' }, Background_Img: { Url: 'https://placehold.co/160x600/111827/ffffff?text=Hotel+Photo' }, Headline: 'Tu escapada perfecta te espera', Subheadline: 'Lanzarote, frente al mar', CTA_Text: 'Reserva ahora', Landing_URL: { Url: 'https://www.dreamplacehotels.com' } });
            }
        }
        function setupBannerContent(data) {
            document.getElementById('color-bar').style.background = data.Hotel_Color;
            document.getElementById('hotel-name').textContent = data.Hotel_Name;
            document.getElementById('headline').textContent = data.Headline;
            document.getElementById('subheadline').textContent = data.Subheadline;
            document.getElementById('cta-btn').textContent = data.CTA_Text;
            document.getElementById('hotel-logo').src = data.Hotel_Logo.Url;
            const bgImg = new Image();
            bgImg.onload = function () { document.getElementById('hotel-bg').src = bgImg.src; document.getElementById('banner').style.visibility = 'visible'; setupExits(data); initAnimations(); };
            bgImg.src = data.Background_Img.Url;
        }
        function setupExits(data) {
            const url = data.Landing_URL.Url;
            document.getElementById('bg-exit').addEventListener('click', function () { Enabler.exitOverride('Background_Click', url); });
            document.getElementById('cta-btn').addEventListener('click', function (e) { e.stopPropagation(); Enabler.exitOverride('CTA_Click', url); });
        }
        function initAnimations() {
            const tl = gsap.timeline();
            tl
                .to('#hotel-bg', { scale: 1, duration: 2.5, ease: 'power1.inOut' }, 0)
                .to('#color-bar', { y: 0, duration: 0.65, ease: 'power3.out' }, 0.3)
                .to('#logo-container', { opacity: 1, y: 0, duration: 0.42, ease: 'power2.out' }, 0.3)
                .from('#hotel-name', { opacity: 0, y: 6, duration: 0.3, ease: 'power2.out' }, 1.0)
                .to('#separator', { scaleX: 1, duration: 0.38, ease: 'power2.inOut' }, 1.22)
                .from('#headline', { opacity: 0, y: 7, duration: 0.35, ease: 'power2.out' }, 1.42)
                .from('#subheadline', { opacity: 0, y: 6, duration: 0.3, ease: 'power2.out' }, 1.62)
                .to('#cta-btn', { scale: 1, duration: 0.4, ease: 'back.out(1.5)' }, 1.82)
                .to('#cta-btn', { scale: 1.06, repeat: 2, yoyo: true, duration: 0.22, delay: 0.9, ease: 'power1.inOut' });
        }
    </script>
</body>
</html>
