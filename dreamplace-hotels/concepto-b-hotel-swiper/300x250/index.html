<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DreamPlace — 300×250 — Hotel Swiper</title>

    <script src="https://s0.2mdn.net/ads/studio/Enabler.js"></script>
    <script src="https://s0.2mdn.net/ads/studio/cached_libs/gsap_3.14.2_min.js"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css">
    <script src="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.js"></script>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Montserrat:wght@500;600;700;800&display=swap" rel="stylesheet">

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body, html { width: 100%; height: 100%; overflow: hidden; background: #000; }

        #banner {
            position: relative;
            width: 300px;
            height: 250px;
            background: #0B1828;
            border: 1px solid #1c2d3f;
            overflow: hidden;
            visibility: hidden;
            user-select: none;
            font-family: 'Montserrat', Arial, sans-serif;
        }

        #banner::before {
            content: '';
            position: absolute; inset: 0;
            background:
                radial-gradient(ellipse at 78% 18%, rgba(200,151,63,0.11) 0%, transparent 50%),
                radial-gradient(ellipse at 15% 85%, rgba(30,90,160,0.09) 0%, transparent 48%);
            z-index: 0;
            pointer-events: none;
        }

        #gold-bar {
            position: absolute;
            top: 0; left: 0; right: 0; height: 2px;
            background: linear-gradient(90deg, transparent 0%, #C8973F 20%, #F0C878 50%, #C8973F 80%, transparent 100%);
            z-index: 6;
            transform-origin: left center;
        }

        #header {
            position: absolute;
            top: 7px; left: 12px; right: 12px; height: 22px;
            display: flex; align-items: center; justify-content: space-between;
            z-index: 5;
        }

        #logo { display: flex; align-items: center; gap: 4px; }
        .logo-pin { width: 12px; height: 12px; fill: #C8973F; flex-shrink: 0; }
        .logo-wordmark { font-weight: 800; font-size: 11px; color: #fff; letter-spacing: -0.01em; }
        .logo-wordmark em { font-style: normal; color: #C8973F; }

        #stars { display: flex; gap: 1.5px; }
        .star { font-size: 8px; color: #C8973F; }

        #photo-wrap {
            position: absolute;
            top: 34px; left: 12px;
            width: 138px; height: 158px;
            border-radius: 12px;
            overflow: visible;
            z-index: 3;
            will-change: transform;
        }

        #photo-inner {
            width: 100%; height: 100%;
            border-radius: 12px;
            overflow: hidden;
            box-shadow:
                0 0 0 1.5px rgba(200,151,63,0.45),
                0 12px 30px rgba(0,0,0,0.7),
                0 4px 10px rgba(0,0,0,0.4);
        }

        .hotel-swiper { width: 100%; height: 100%; }

        .hotel-swiper .swiper-slide img {
            width: 100%; height: 100%;
            object-fit: cover; display: block;
        }

        .swiper-overlay {
            position: absolute;
            bottom: 0; left: 0; right: 0; height: 42px;
            background: linear-gradient(transparent, rgba(5,12,28,0.82));
            z-index: 2; pointer-events: none;
            border-radius: 0 0 12px 12px;
        }

        .hotel-swiper { --swiper-pagination-color: #C8973F; --swiper-pagination-bullet-inactive-color: rgba(255,255,255,0.4); --swiper-pagination-bullet-inactive-opacity: 1; --swiper-pagination-bullet-size: 5px; --swiper-pagination-bullet-horizontal-gap: 3px; }
        .swiper-pagination { bottom: 8px !important; z-index: 3; }
        .swiper-pagination-bullet-active { width: 14px !important; border-radius: 3px !important; transition: width 0.3s ease !important; }

        #info {
            position: absolute;
            top: 34px; left: 160px;
            width: 128px;
            z-index: 4;
        }

        #location { display: flex; align-items: center; gap: 3px; margin-bottom: 5px; }
        .info-pin { width: 7px; height: 7px; fill: #C8973F; flex-shrink: 0; }
        #destino-text {
            font-size: 7.5px; font-weight: 700; color: #C8973F;
            text-transform: uppercase; letter-spacing: 0.06em;
            white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
        }

        #hotel-name {
            font-family: 'Playfair Display', Georgia, serif;
            font-weight: 700; font-size: 18px; line-height: 1.1;
            color: #fff; margin-bottom: 7px;
            max-height: 43px; overflow: hidden;
        }

        .divider {
            width: 100%; height: 1px;
            background: linear-gradient(90deg, rgba(200,151,63,0.65), transparent);
            margin-bottom: 7px;
        }

        #tagline {
            font-size: 7.5px; font-weight: 500;
            color: rgba(255,255,255,0.42); line-height: 1.42;
            margin-bottom: 10px; max-height: 32px; overflow: hidden;
        }

        #price-block { margin-bottom: 8px; }
        #price-label {
            font-size: 7px; font-weight: 600; color: rgba(255,255,255,0.38);
            text-transform: uppercase; letter-spacing: 0.1em;
            display: block; margin-bottom: 1px;
        }
        #price-row { display: flex; align-items: baseline; gap: 3px; }
        #price-value {
            font-family: 'Playfair Display', serif;
            font-size: 24px; font-weight: 700; color: #fff; line-height: 1;
        }
        #price-unit { font-size: 8.5px; font-weight: 500; color: rgba(255,255,255,0.4); }

        #discount {
            display: inline-flex; align-items: center;
            background: linear-gradient(135deg, #B87B28, #C8973F, #EBBA5A);
            color: #06101e; font-size: 8.5px; font-weight: 800;
            padding: 3px 9px; border-radius: 20px; letter-spacing: 0.04em;
            white-space: nowrap;
        }

        #cta-btn {
            position: absolute;
            bottom: 12px; left: 12px; right: 12px; height: 36px;
            z-index: 12;
            background: linear-gradient(100deg, #B07020, #C8973F 40%, #EBBA5A 65%, #C8973F 85%, #B07020);
            background-size: 250% 100%;
            border: none; border-radius: 6px;
            color: #06101e;
            font-family: 'Montserrat', Arial, sans-serif;
            font-weight: 800; font-size: 10.5px;
            letter-spacing: 0.1em; text-transform: uppercase;
            cursor: pointer; overflow: hidden; will-change: transform;
            display: flex; align-items: center; justify-content: center; gap: 7px;
        }

        #cta-shine {
            position: absolute; top: 0; left: 0;
            width: 35%; height: 100%;
            background: linear-gradient(105deg, transparent, rgba(255,255,255,0.32), transparent);
            pointer-events: none;
        }

        #cta-arrow { font-size: 13px; line-height: 1; }
        #bg-exit { position: absolute; inset: 0; z-index: 10; cursor: pointer; }
    </style>
</head>
<body>
    <div id="banner">
        <div id="gold-bar"></div>

        <div id="header">
            <div id="logo">
                <svg class="logo-pin" viewBox="0 0 24 24"><path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7zm0 9.5c-1.38 0-2.5-1.12-2.5-2.5s1.12-2.5 2.5-2.5 2.5 1.12 2.5 2.5-1.12 2.5-2.5 2.5z"/></svg>
                <span class="logo-wordmark">dream<em>place</em></span>
            </div>
            <div id="stars"></div>
        </div>

        <div id="photo-wrap">
            <div id="photo-inner">
                <div class="swiper hotel-swiper">
                    <div class="swiper-wrapper">
                        <div class="swiper-slide"><img id="foto-1" src="" alt=""></div>
                        <div class="swiper-slide"><img id="foto-2" src="" alt=""></div>
                        <div class="swiper-slide"><img id="foto-3" src="" alt=""></div>
                    </div>
                    <div class="swiper-pagination"></div>
                </div>
                <div class="swiper-overlay"></div>
            </div>
        </div>

        <div id="info">
            <div id="location">
                <svg class="info-pin" viewBox="0 0 24 24"><path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7zm0 9.5c-1.38 0-2.5-1.12-2.5-2.5s1.12-2.5 2.5-2.5 2.5 1.12 2.5 2.5-1.12 2.5-2.5 2.5z"/></svg>
                <span id="destino-text">Marbella, España</span>
            </div>
            <div id="hotel-name">Hotel Riviera Palace</div>
            <div class="divider"></div>
            <div id="tagline">Lujo frente al mar con vistas espectaculares.</div>
            <div id="price-block">
                <span id="price-label">Desde</span>
                <div id="price-row">
                    <span id="price-value">189€</span>
                    <span id="price-unit">/noche</span>
                </div>
            </div>
            <span id="discount">−25% OFF</span>
        </div>

        <div id="bg-exit"></div>
        <button id="cta-btn">
            <span id="cta-label">Reserva ahora</span>
            <span id="cta-arrow">→</span>
            <span id="cta-shine"></span>
        </button>
    </div>

    <script>
        // ⚠️ Actualizar profileId y nombre del perfil cuando el cliente facilite el feed de Studio
        Enabler.setProfileId(0);

        window.onload = function () {
            if (Enabler.isInitialized()) { enablerInitHandler(); }
            else { Enabler.addEventListener(studio.events.StudioEvent.INIT, enablerInitHandler); }
        };

        function enablerInitHandler() {
            if (Enabler.isVisible()) { devDynamicContentInit(); }
            else { Enabler.addEventListener(studio.events.StudioEvent.VISIBLE, devDynamicContentInit); }
        }

        function devDynamicContentInit() {
            // ⚠️ Reemplazar 'DreamPlace_Swiper' por el nombre exacto del perfil en Studio
            if (typeof dynamicContent !== 'undefined' && dynamicContent.DreamPlace_Swiper) {
                setupBannerContent(dynamicContent.DreamPlace_Swiper[0]);
            } else {
                setupBannerContent({
                    Hotel_Name:      'Hotel Riviera Palace',
                    Hotel_Destino:   'Marbella, España',
                    Hotel_Tagline:   'Lujo frente al mar con vistas espectaculares.',
                    Hotel_Estrellas: '5',
                    Hotel_Precio:    '189€',
                    Hotel_Descuento: '−25%',
                    CTA_Text:        'Reserva ahora',
                    Landing_URL:     { Url: 'https://www.dreamplacehotels.com' },
                    Foto_1:          { Url: 'https://images.unsplash.com/photo-1571896349842-33c89424de2d?w=400&q=80' },
                    Foto_2:          { Url: 'https://images.unsplash.com/photo-1520250497591-112f2f40a3f4?w=400&q=80' },
                    Foto_3:          { Url: 'https://images.unsplash.com/photo-1582719478250-c89cae4dc85b?w=400&q=80' }
                });
            }
        }

        function setupBannerContent(data) {
            document.getElementById('hotel-name').textContent   = data.Hotel_Name;
            document.getElementById('destino-text').textContent = data.Hotel_Destino;
            document.getElementById('tagline').textContent      = data.Hotel_Tagline;
            document.getElementById('price-value').textContent  = data.Hotel_Precio;
            document.getElementById('discount').textContent     = data.Hotel_Descuento + ' OFF';
            document.getElementById('cta-label').textContent    = data.CTA_Text;

            var starsEl = document.getElementById('stars');
            var count = parseInt(data.Hotel_Estrellas) || 5;
            starsEl.innerHTML = '';
            for (var i = 0; i < count; i++) {
                var s = document.createElement('span');
                s.className = 'star'; s.textContent = '★';
                starsEl.appendChild(s);
            }

            var items = [
                { el: document.getElementById('foto-1'), url: data.Foto_1.Url },
                { el: document.getElementById('foto-2'), url: data.Foto_2.Url },
                { el: document.getElementById('foto-3'), url: data.Foto_3.Url }
            ];
            var loaded = 0;
            items.forEach(function (item) {
                item.el.onload = item.el.onerror = function () {
                    if (++loaded >= items.length) { initBanner(data); }
                };
                item.el.src = item.url;
            });
        }

        function initBanner(data) {
            document.getElementById('banner').style.visibility = 'visible';
            setupExits(data);
            new Swiper('.hotel-swiper', {
                effect: 'fade',
                fadeEffect: { crossFade: true },
                autoplay: { delay: 2800, disableOnInteraction: false },
                loop: true,
                speed: 900,
                pagination: { el: '.swiper-pagination' }
            });
            initAnimations();
        }

        function setupExits(data) {
            var url = data.Landing_URL.Url;
            document.getElementById('bg-exit').addEventListener('click', function () {
                Enabler.exitOverride('Background_Click', url);
            });
            document.getElementById('cta-btn').addEventListener('click', function (e) {
                e.stopPropagation();
                Enabler.exitOverride('CTA_Click', url);
            });
        }

        function initAnimations() {
            gsap.set('#gold-bar',   { scaleX: 0, transformOrigin: 'left center' });
            gsap.set('#header',     { opacity: 0, y: -12 });
            gsap.set('#photo-wrap', { opacity: 0, scale: 0.88, rotation: -4, transformOrigin: 'center center' });
            gsap.set('#info',       { opacity: 0, x: 20 });
            gsap.set('#cta-btn',    { opacity: 0, y: 16 });
            gsap.set('#cta-shine',  { xPercent: -160 });

            gsap.timeline({ defaults: { ease: 'power3.out' } })
                .to('#gold-bar',   { scaleX: 1, duration: 0.6, ease: 'power2.out' })
                .to('#header',     { opacity: 1, y: 0, duration: 0.42 },                                 '-=0.35')
                .to('#photo-wrap', { opacity: 1, scale: 1, rotation: 0, duration: 0.75, ease: 'back.out(1.4)' }, '-=0.28')
                .to('#info',       { opacity: 1, x: 0, duration: 0.55 },                                 '-=0.52')
                .to('#cta-btn',    { opacity: 1, y: 0, duration: 0.42, ease: 'back.out(1.8)' },          '-=0.32')
                .to('#cta-shine',  { xPercent: 350, duration: 0.85, ease: 'power2.inOut' },              '+=0.22')
                .to('#photo-wrap', { y: -5, duration: 2.2, ease: 'sine.inOut', repeat: -1, yoyo: true }, '+=0.4')
                .to('#cta-btn',    { scale: 1.04, duration: 0.35, repeat: 3, yoyo: true, ease: 'power1.inOut' }, '-=5.0');
        }
    </script>
</body>
</html>
